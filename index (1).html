<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultScope · DeFi 金库追踪器</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #08090d;
      --surface: #0f1117;
      --surface2: #161822;
      --border: #1e2130;
      --accent: #00e5a0;
      --accent2: #7b61ff;
      --warn: #ff6b35;
      --text: #e8eaf0;
      --muted: #5a5f78;
      --up: #00e5a0;
      --down: #ff4d6d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 0;
      background: rgba(8,9,13,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 800; }
    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent);
      border: 1px solid rgba(0,229,160,0.25); padding: 4px 10px; border-radius: 20px;
    }
    .live-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

    .search-section { padding: 28px 0 0; }
    .search-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 8px; }
    .search-row { display: flex; gap: 10px; }
    .address-bar {
      flex: 1; display: flex; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px 4px 4px 16px;
      transition: border-color 0.2s;
    }
    .address-bar:focus-within { border-color: rgba(0,229,160,0.4); }
    .address-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Space Mono', monospace; font-size: 13px; padding: 10px 0;
    }
    .address-input::placeholder { color: var(--muted); }
    .search-btn {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 10px 22px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
      margin: 20px 0;
    }
    .stat-item { background: var(--surface); padding: 16px 18px; }
    .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 5px; }
    .stat-value { font-size: 19px; font-weight: 800; }
    .stat-sub { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 3px; }
    .stat-sub.up { color: var(--up); }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; margin-top: 24px; }
    .section-title { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; }
    .section-title span { color: var(--accent); }
    .section-count { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }

    .protocol-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .protocol-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
    }
    .protocol-card:hover { border-color: rgba(0,229,160,0.25); transform: translateY(-1px); }
    .protocol-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 15px; border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .protocol-identity { display: flex; align-items: center; gap: 10px; }
    .protocol-logo {
      width: 32px; height: 32px; border-radius: 9px;
      background: var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 16px; overflow: hidden; flex-shrink: 0;
    }
    .protocol-logo img { width: 100%; height: 100%; object-fit: cover; }
    .protocol-name { font-size: 14px; font-weight: 700; }
    .protocol-chain-row { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .protocol-usd { font-size: 15px; font-weight: 800; color: var(--accent); }

    .pool-row {
      padding: 11px 15px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    }
    .pool-row:last-child { border-bottom: none; }
    .pool-type-badge {
      font-size: 10px; font-family: 'Space Mono', monospace;
      padding: 2px 6px; border-radius: 4px; border: 1px solid;
      white-space: nowrap; flex-shrink: 0; margin-top: 2px;
    }
    .pool-type-badge.lending { color: #7b61ff; border-color: rgba(123,97,255,0.3); }
    .pool-type-badge.liquidity { color: var(--accent); border-color: rgba(0,229,160,0.3); }
    .pool-type-badge.staking { color: var(--warn); border-color: rgba(255,107,53,0.3); }
    .pool-type-badge.yield { color: #f5c518; border-color: rgba(245,197,24,0.3); }
    .pool-tokens { flex: 1; min-width: 0; }
    .token-list { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 3px; }
    .token-pill {
      display: flex; align-items: center; gap: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 7px;
      font-size: 11px; font-family: 'Space Mono', monospace;
    }
    .token-pill img { width: 12px; height: 12px; border-radius: 50%; }
    .pool-meta { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pool-value { text-align: right; flex-shrink: 0; }
    .pool-usd { font-size: 13px; font-weight: 700; }
    .pool-apy { font-size: 11px; color: var(--up); font-family: 'Space Mono', monospace; margin-top: 2px; }

    .state-box {
      border: 1px solid var(--border); border-radius: 14px;
      padding: 60px 24px; text-align: center; color: var(--muted);
    }
    .state-box .icon { font-size: 36px; margin-bottom: 14px; }
    .state-box .title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .state-box .sub { font-size: 13px; font-family: 'Space Mono', monospace; line-height: 1.7; }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chain-badge {
      font-size: 10px; font-family: 'Space Mono', monospace;
      padding: 1px 7px; border-radius: 4px; border: 1px solid;
    }

    /* Saved wallet tags */
    .saved-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 6px; margin-top: 10px; }
    .wallet-tabs { display: flex; gap: 7px; flex-wrap: wrap; }
    .wallet-tab {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 12px; font-family: 'Space Mono', monospace; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .wallet-tab:hover { border-color: rgba(0,229,160,0.4); color: var(--accent); }
    .wallet-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.07); }
    .wallet-tab .x { font-size: 14px; opacity: 0.5; transition: opacity 0.15s; margin-left: 2px; }
    .wallet-tab .x:hover { opacity: 1; color: var(--down); }

    .save-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-family: 'Space Mono', monospace;
      cursor: pointer; transition: all 0.15s;
    }
    .save-btn:hover { border-color: var(--accent); color: var(--accent); }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--accent);
      color: var(--text); padding: 11px 16px; border-radius: 10px;
      font-size: 13px; font-family: 'Space Mono', monospace;
      transform: translateY(70px); opacity: 0;
      transition: all 0.28s; z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media(max-width:700px) {
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .protocol-grid { grid-template-columns: 1fr; }
      .search-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo"><div class="logo-icon">⬡</div>VaultScope</div>
      <div class="live-badge"><div class="live-dot"></div>链上数据</div>
    </div>
  </div>
</header>

<div class="container" style="padding-bottom:60px;">

  <div class="search-section">
    <div class="search-label">输入钱包地址</div>
    <div class="search-row">
      <div class="address-bar">
        <input class="address-input" id="addrInput"
          placeholder="0x... 钱包地址（如 0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045）"
          onkeydown="if(event.key==='Enter')doSearch()" />
      </div>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">查询</button>
    </div>

    <div id="savedSection" style="display:none">
      <div class="saved-label" style="margin-top:10px">已保存地址</div>
      <div class="wallet-tabs" id="walletTabs"></div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-label">DeFi 总资产</div>
      <div class="stat-value" id="sTotalUsd">—</div>
      <div class="stat-sub" id="sChains">输入地址开始查询</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">协议数量</div>
      <div class="stat-value" id="sProtocols">—</div>
      <div class="stat-sub" id="sChainList">跨多链</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">最大持仓协议</div>
      <div class="stat-value" id="sTopName" style="font-size:15px">—</div>
      <div class="stat-sub" id="sTopUsd">—</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">头寸总数</div>
      <div class="stat-value" id="sPositions">—</div>
      <div class="stat-sub">活跃 DeFi 头寸</div>
    </div>
  </div>

  <div id="mainContent">
    <div class="state-box">
      <div class="icon">🔍</div>
      <div class="title">输入钱包地址开始追踪</div>
      <div class="sub">支持以太坊、Arbitrum、Polygon、BSC、Base 等 30+ 条链<br>数据来源：DeBank</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let savedWallets = JSON.parse(localStorage.getItem('vs_wallets') || '[]');
let currentAddr = '';

function fmt(n) {
  if (!n || isNaN(n)) return '$0';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
}
function shortAddr(a) {
  if (!a) return '';
  if (a.endsWith('.eth')) return a;
  return a.slice(0,6) + '…' + a.slice(-4);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

const CHAINS = {
  eth:  '#627EEA', arb: '#28A0F0', matic: '#8247E5',
  bsc:  '#F0B90B', base: '#0052FF', op: '#FF0420',
  avax: '#E84142', ftm: '#1969FF', xdai: '#48A9A6',
  cro:  '#002D74', klay: '#FF6B00', aurora: '#70D44B',
};
const CHAIN_NAMES = {
  eth:'Ethereum', arb:'Arbitrum', matic:'Polygon', bsc:'BSC',
  base:'Base', op:'Optimism', avax:'Avalanche', ftm:'Fantom',
  xdai:'Gnosis', cro:'Cronos',
};
function chainColor(id) { return CHAINS[id] || '#5a5f78'; }
function chainName(id) { return CHAIN_NAMES[id] || id?.toUpperCase() || '?'; }

function poolType(name) {
  const n = (name||'').toLowerCase();
  if (/lend|supply|borrow|deposit/.test(n)) return 'lending';
  if (/liqui|lp|pool|pair/.test(n)) return 'liquidity';
  if (/stak|lock|govern|vote|escrw/.test(n)) return 'staking';
  return 'yield';
}

function saveCurrent() {
  if (!currentAddr) return;
  if (!savedWallets.includes(currentAddr)) {
    savedWallets.push(currentAddr);
    localStorage.setItem('vs_wallets', JSON.stringify(savedWallets));
    renderTabs();
    showToast('✓ 地址已保存');
  } else {
    showToast('地址已存在');
  }
}

function removeWallet(addr, e) {
  e.stopPropagation();
  savedWallets = savedWallets.filter(w => w !== addr);
  localStorage.setItem('vs_wallets', JSON.stringify(savedWallets));
  renderTabs();
}

function renderTabs() {
  const sec = document.getElementById('savedSection');
  const tabs = document.getElementById('walletTabs');
  if (savedWallets.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  tabs.innerHTML = savedWallets.map(w => `
    <div class="wallet-tab ${w===currentAddr?'active':''}" onclick="loadWallet('${w}')">
      <span>${shortAddr(w)}</span>
      <span class="x" onclick="removeWallet('${w}',event)">×</span>
    </div>`).join('');
}

async function doSearch() {
  const raw = document.getElementById('addrInput').value.trim();
  if (!raw) { showToast('请输入钱包地址'); return; }
  await loadWallet(raw);
}

async function loadWallet(addr) {
  currentAddr = addr;
  document.getElementById('addrInput').value = addr;
  renderTabs();

  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '查询中…';

  document.getElementById('mainContent').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="title">正在读取链上数据…</div>
      <div class="sub">${shortAddr(addr)}</div>
    </div>`;
  ['sTotalUsd','sProtocols','sTopName','sTopUsd','sPositions'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  document.getElementById('sChains').textContent = '加载中…';
  document.getElementById('sChains').className = 'stat-sub';

  try {
    const url = `https://api.debank.com/portfolio/project_list?user_addr=${addr.toLowerCase()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const projects = (json.data || []).sort((a, b) => {
      const va = (a.portfolio_item_list||[]).reduce((s,i)=>s+(i.stats?.net_usd_value||0),0);
      const vb = (b.portfolio_item_list||[]).reduce((s,i)=>s+(i.stats?.net_usd_value||0),0);
      return vb - va;
    });

    let totalUsd = 0, totalPos = 0;
    const chains = new Set();
    projects.forEach(p => {
      chains.add(p.chain);
      (p.portfolio_item_list||[]).forEach(i => {
        totalUsd += (i.stats?.net_usd_value || 0);
        totalPos++;
      });
    });

    const top = projects[0];
    const topUsd = top ? (top.portfolio_item_list||[]).reduce((s,i)=>s+(i.stats?.net_usd_value||0),0) : 0;

    document.getElementById('sTotalUsd').textContent = fmt(totalUsd);
    document.getElementById('sChains').textContent = `跨 ${chains.size} 条链`;
    document.getElementById('sChains').className = 'stat-sub up';
    document.getElementById('sProtocols').textContent = projects.length;
    document.getElementById('sChainList').textContent = [...chains].slice(0,4).map(chainName).join(' · ');
    document.getElementById('sTopName').textContent = top?.name || '—';
    document.getElementById('sTopUsd').textContent = top ? fmt(topUsd) : '—';
    document.getElementById('sPositions').textContent = totalPos;

    if (projects.length === 0) {
      document.getElementById('mainContent').innerHTML = `
        <div class="state-box">
          <div class="icon">📭</div>
          <div class="title">未发现 DeFi 头寸</div>
          <div class="sub">该地址在已支持协议中暂无活跃仓位</div>
        </div>`;
      return;
    }

    const cardsHTML = projects.map(proj => {
      const totalV = (proj.portfolio_item_list||[]).reduce((s,i)=>s+(i.stats?.net_usd_value||0),0);
      const logoHTML = proj.logo_url
        ? `<img src="${proj.logo_url}" onerror="this.parentNode.innerHTML='🔷'" />`
        : '🔷';

      const poolsHTML = (proj.portfolio_item_list||[]).map(item => {
        const type = poolType(item.name);
        const usd = item.stats?.net_usd_value || 0;
        const dailyYield = item.stats?.daily_yield_usd;
        const apyStr = (dailyYield && usd > 0)
          ? ((dailyYield / usd) * 365 * 100).toFixed(1) + '% APY' : '';

        const allTokens = [
          ...(item.detail?.supply_token_list||[]),
          ...(item.detail?.borrow_token_list||[]),
          ...(item.detail?.reward_token_list||[]),
          ...(item.detail?.token_list||[]),
        ];

        const pills = allTokens.slice(0, 4).map(tok => {
          const img = tok.logo_url ? `<img src="${tok.logo_url}" onerror="this.style.display='none'" />` : '';
          const bal = tok.amount > 0 ? (tok.amount > 0.001 ? tok.amount.toFixed(3) : '<0.001') : '';
          return `<span class="token-pill">${img}${tok.symbol}${bal?' · '+bal:''}</span>`;
        }).join('');

        return `<div class="pool-row">
          <span class="pool-type-badge ${type}">${type}</span>
          <div class="pool-tokens">
            <div class="token-list">${pills || '<span style="color:var(--muted);font-size:11px;font-family:Space Mono,monospace">—</span>'}</div>
            <div class="pool-meta">${item.name||''}</div>
          </div>
          <div class="pool-value">
            <div class="pool-usd">${fmt(usd)}</div>
            ${apyStr ? `<div class="pool-apy">${apyStr}</div>` : ''}
          </div>
        </div>`;
      }).join('');

      return `<div class="protocol-card">
        <div class="protocol-header">
          <div class="protocol-identity">
            <div class="protocol-logo">${logoHTML}</div>
            <div>
              <div class="protocol-name">${proj.name}</div>
              <div class="protocol-chain-row">
                <span class="chain-badge" style="border-color:${chainColor(proj.chain)}40;color:${chainColor(proj.chain)}">${chainName(proj.chain)}</span>
              </div>
            </div>
          </div>
          <div class="protocol-usd">${fmt(totalV)}</div>
        </div>
        ${poolsHTML}
      </div>`;
    }).join('');

    document.getElementById('mainContent').innerHTML = `
      <div class="section-header">
        <div class="section-title">DeFi <span>头寸</span></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="section-count">${projects.length} 个协议 · ${totalPos} 个头寸</span>
          <button class="save-btn" onclick="saveCurrent()">+ 保存此地址</button>
        </div>
      </div>
      <div class="protocol-grid">${cardsHTML}</div>`;

  } catch(err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <div class="title">查询失败</div>
        <div class="sub">${err.message}<br><br>
          DeBank API 在部分地区需要代理访问<br>
          请确保网络畅通后重试
        </div>
      </div>`;
    showToast('查询失败：' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '查询';
  }
}

renderTabs();
</script>
</body>
</html>
