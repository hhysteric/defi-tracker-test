<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defi Tracker</title>
</head>
<body>
    <h1>Wallet Balances</h1>
    <div id="balances"></div>
    <script>
        async function loadWallet() {
            const apiKey = 'e2f4ed92-88d8-461b-9642-ca9c884aac8d'; // Zapper API key
            const walletAddress = 'YOUR_WALLET_ADDRESS'; // Replace with actual wallet address
            const url = `https://api.zapper.fi/v2/apps/tokens/balances?address=${walletAddress}`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });

                if (response.status === 429) {
                    // Handle HTTP 429 Too Many Requests
                    document.getElementById('balances').innerHTML = '<p>Rate limit exceeded. Please try again later.</p>';
                    return;
                }

                const data = await response.json();
                // Process the data and update UI
                document.getElementById('balances').innerText = JSON.stringify(data);
            } catch (error) {
                console.error('Error fetching wallet data:', error);
            }
        }

        loadWallet();
    </script>
</body>
</html>
