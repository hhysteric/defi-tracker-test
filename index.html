<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeFi 金库追踪器</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #08090d;
      --surface: #0f1117;
      --surface2: #161822;
      --border: #1e2130;
      --accent: #00e5a0;
      --accent2: #7b61ff;
      --warn: #ff6b35;
      --text: #e8eaf0;
      --muted: #5a5f78;
      --up: #00e5a0;
      --down: #ff4d6d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      backdrop-filter: blur(12px);
      position: sticky; top: 0;
      background: rgba(8,9,13,0.85);
      z-index: 100;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; color: var(--accent);
      border: 1px solid rgba(0,229,160,0.3);
      padding: 4px 10px; border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Hero stats bar */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      margin: 28px 0;
    }
    .stat-item {
      background: var(--surface);
      padding: 20px 24px;
      transition: background 0.2s;
    }
    .stat-item:hover { background: var(--surface2); }
    .stat-label {
      font-size: 11px; color: var(--muted); letter-spacing: 1px;
      text-transform: uppercase; font-family: 'Space Mono', monospace;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px;
    }
    .stat-change {
      font-size: 12px; font-family: 'Space Mono', monospace;
      margin-top: 4px;
    }
    .stat-change.up { color: var(--up); }
    .stat-change.down { color: var(--down); }

    /* Section title */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); font-family: 'Space Mono', monospace;
    }
    .section-title span { color: var(--accent); }

    /* Vault cards */
    .vault-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .vault-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .vault-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      opacity: 0; transition: opacity 0.2s;
    }
    .vault-card.green::before { background: linear-gradient(90deg, var(--accent), transparent); }
    .vault-card.purple::before { background: linear-gradient(90deg, var(--accent2), transparent); }
    .vault-card.orange::before { background: linear-gradient(90deg, var(--warn), transparent); }
    .vault-card:hover {
      border-color: rgba(0,229,160,0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,229,160,0.06);
    }
    .vault-card:hover::before { opacity: 1; }

    .vault-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .vault-identity { display: flex; align-items: center; gap: 10px; }
    .vault-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .vault-icon.green { background: rgba(0,229,160,0.12); }
    .vault-icon.purple { background: rgba(123,97,255,0.12); }
    .vault-icon.orange { background: rgba(255,107,53,0.12); }

    .vault-name { font-size: 15px; font-weight: 700; }
    .vault-protocol { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: 'Space Mono', monospace; }

    .vault-apy {
      text-align: right;
    }
    .apy-value { font-size: 20px; font-weight: 800; color: var(--accent); }
    .apy-label { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 1px; }

    .vault-metrics {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 16px;
    }
    .metric { }
    .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-family: 'Space Mono', monospace; margin-bottom: 4px; }
    .metric-value { font-size: 13px; font-weight: 600; }

    /* Sparkline */
    .sparkline-wrap { height: 40px; margin-top: 4px; }
    svg.sparkline { width: 100%; height: 100%; }

    /* Activity feed */
    .activity-list { display: flex; flex-direction: column; gap: 8px; }
    .activity-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      transition: background 0.15s;
    }
    .activity-item:hover { background: var(--surface2); }
    .activity-type {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .activity-type.deposit { background: rgba(0,229,160,0.12); }
    .activity-type.withdraw { background: rgba(255,77,109,0.12); }
    .activity-type.harvest { background: rgba(255,215,0,0.1); }
    .activity-body { flex: 1; }
    .activity-title { font-size: 13px; font-weight: 600; }
    .activity-meta { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }
    .activity-amount { text-align: right; }
    .activity-usd { font-size: 14px; font-weight: 700; }
    .activity-usd.positive { color: var(--up); }
    .activity-usd.negative { color: var(--down); }
    .activity-time { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }

    /* Chain filter */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 12px; font-family: 'Space Mono', monospace;
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: rgba(0,229,160,0.1);
      border-color: var(--accent); color: var(--accent);
    }

    /* Address input */
    .address-bar {
      display: flex; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 4px 4px 4px 16px;
      margin-bottom: 28px;
      transition: border-color 0.2s;
    }
    .address-bar:focus-within { border-color: rgba(0,229,160,0.4); }
    .address-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Space Mono', monospace;
      font-size: 13px; padding: 10px 0;
    }
    .address-input::placeholder { color: var(--muted); }
    .address-btn {
      background: var(--accent); color: #000;
      border: none; border-radius: 8px;
      padding: 10px 18px; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 13px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .address-btn:hover { opacity: 0.85; }

    /* Refresh button */
    .refresh-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 6px 12px;
      border-radius: 8px; font-family: 'Space Mono', monospace;
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-icon { display: inline-block; transition: transform 0.4s; }
    .refresh-btn.spinning .refresh-icon { animation: spin 0.6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--accent);
      color: var(--text); padding: 12px 18px; border-radius: 10px;
      font-size: 13px; font-family: 'Space Mono', monospace;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s; z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* Tag */
    .chain-tag {
      font-size: 10px; font-family: 'Space Mono', monospace;
      padding: 2px 8px; border-radius: 4px;
      border: 1px solid var(--border); color: var(--muted);
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) {
      .two-col { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .vault-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⬡</div>
        VaultScope
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        实时更新
      </div>
    </div>
  </div>
</header>

<div class="container" style="padding-top:28px; padding-bottom:60px;">

  <!-- Address bar -->
  <div class="address-bar">
    <input class="address-input" id="addressInput" placeholder="输入钱包地址或 ENS 名称，例如 0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045" />
    <button class="address-btn" onclick="loadWallet()">追踪</button>
  </div>

  <!-- Summary stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-label">总锁仓价值 (TVL)</div>
      <div class="stat-value" id="tvl">$48,320</div>
      <div class="stat-change up" id="tvlChange">▲ +2.4% (24h)</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">总收益 (累计)</div>
      <div class="stat-value" id="totalEarned">$3,214</div>
      <div class="stat-change up">▲ +$87 今日</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">活跃金库数</div>
      <div class="stat-value" id="vaultCount">6</div>
      <div class="stat-change" style="color:var(--muted)">跨 3 条链</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">平均 APY</div>
      <div class="stat-value" id="avgApy">18.7%</div>
      <div class="stat-change down">▼ -0.3% (7d)</div>
    </div>
  </div>

  <!-- Chain filter + vault cards -->
  <div class="section-header">
    <div class="section-title">金库 <span>概览</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
      <span class="refresh-icon">↺</span> 刷新
    </button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterChain(this,'all')">全部</button>
    <button class="filter-btn" onclick="filterChain(this,'ethereum')">Ethereum</button>
    <button class="filter-btn" onclick="filterChain(this,'arbitrum')">Arbitrum</button>
    <button class="filter-btn" onclick="filterChain(this,'polygon')">Polygon</button>
    <button class="filter-btn" onclick="filterChain(this,'base')">Base</button>
  </div>
  <div class="vault-grid" id="vaultGrid"></div>

  <!-- Activity + top vaults -->
  <div class="two-col">
    <div>
      <div class="section-header">
        <div class="section-title">最新 <span>活动</span></div>
      </div>
      <div class="activity-list" id="activityList"></div>
    </div>
    <div>
      <div class="section-header">
        <div class="section-title">收益 <span>排行</span></div>
      </div>
      <div class="activity-list" id="earningsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const VAULTS = [
  { id:1, name:'USDC-ETH LP', protocol:'Uniswap v3', chain:'ethereum', color:'green', icon:'🔵', apy:14.2, tvl:18400, deposited:12000, earned:312, change:2.1 },
  { id:2, name:'stETH Vault', protocol:'Lido / Yearn', chain:'ethereum', color:'purple', icon:'🟣', apy:5.8, tvl:9800, deposited:8000, earned:204, change:-0.3 },
  { id:3, name:'GMX GLP', protocol:'GMX v2', chain:'arbitrum', color:'orange', icon:'🔵', apy:24.5, tvl:7200, deposited:5000, earned:890, change:4.2 },
  { id:4, name:'USDC Lending', protocol:'Aave v3', chain:'polygon', color:'purple', icon:'👻', apy:8.1, tvl:5500, deposited:5000, earned:215, change:0.5 },
  { id:5, name:'cbETH/ETH', protocol:'Curve + Convex', chain:'base', color:'green', icon:'🌀', apy:12.3, tvl:4200, deposited:3500, earned:198, change:1.8 },
  { id:6, name:'WBTC Vault', protocol:'Morpho Blue', chain:'ethereum', color:'orange', icon:'🟠', apy:9.7, tvl:3220, deposited:3000, earned:396, change:-1.2 },
];

const ACTIVITIES = [
  { type:'deposit', title:'存入 USDC-ETH LP', vault:'Uniswap v3', amount:'+$2,000', time:'5分钟前', positive:true },
  { type:'harvest', title:'收割 GMX 奖励', vault:'GMX v2 · Arbitrum', amount:'+$87.3', time:'1小时前', positive:true },
  { type:'withdraw', title:'取出 stETH', vault:'Lido / Yearn', amount:'-$500', time:'3小时前', positive:false },
  { type:'deposit', title:'存入 USDC Lending', vault:'Aave v3 · Polygon', amount:'+$1,000', time:'6小时前', positive:true },
  { type:'harvest', title:'收割 Curve 奖励', vault:'Curve + Convex', amount:'+$31.2', time:'12小时前', positive:true },
];

const EARNINGS = [
  { title:'GMX GLP', sub:'Arbitrum · 24.5% APY', amount:'+$890', time:'最高收益', positive:true },
  { title:'WBTC Vault', sub:'Ethereum · 9.7% APY', amount:'+$396', time:'稳健增长', positive:true },
  { title:'USDC-ETH LP', sub:'Ethereum · 14.2% APY', amount:'+$312', time:'高流动性', positive:true },
  { title:'USDC Lending', sub:'Polygon · 8.1% APY', amount:'+$215', time:'稳定收益', positive:true },
];

function sparklinePath(data, w, h) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => [
    (i / (data.length-1)) * w,
    h - ((v - min) / range) * (h - 4) - 2
  ]);
  return pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
}

function randomSparkData(trend) {
  let v = 50;
  return Array.from({length:20}, () => {
    v += (Math.random()-0.45) * 8 + trend * 0.3;
    return Math.max(10, Math.min(90, v));
  });
}

let currentFilter = 'all';

function renderVaults(filter) {
  const grid = document.getElementById('vaultGrid');
  const filtered = VAULTS.filter(v => filter==='all' || v.chain===filter);
  grid.innerHTML = filtered.map(v => {
    const data = randomSparkData(v.change);
    const path = sparklinePath(data, 300, 40);
    const isUp = v.change >= 0;
    const chainLabel = {ethereum:'ETH',arbitrum:'ARB',polygon:'POL',base:'BASE'}[v.chain];
    return `
    <div class="vault-card ${v.color}" onclick="showVaultDetail(${v.id})">
      <div class="vault-header">
        <div class="vault-identity">
          <div class="vault-icon ${v.color}">${v.icon}</div>
          <div>
            <div class="vault-name">${v.name}</div>
            <div class="vault-protocol">${v.protocol} · <span class="chain-tag">${chainLabel}</span></div>
          </div>
        </div>
        <div class="vault-apy">
          <div class="apy-value">${v.apy}%</div>
          <div class="apy-label">APY</div>
        </div>
      </div>
      <div class="vault-metrics">
        <div class="metric">
          <div class="metric-label">我的存款</div>
          <div class="metric-value">$${v.deposited.toLocaleString()}</div>
        </div>
        <div class="metric">
          <div class="metric-label">累计收益</div>
          <div class="metric-value" style="color:var(--up)">+$${v.earned}</div>
        </div>
        <div class="metric">
          <div class="metric-label">24h变动</div>
          <div class="metric-value" style="color:${isUp?'var(--up)':'var(--down)'}">${isUp?'▲':'▼'} ${Math.abs(v.change)}%</div>
        </div>
      </div>
      <div class="sparkline-wrap">
        <svg class="sparkline" viewBox="0 0 300 40" preserveAspectRatio="none">
          <defs>
            <linearGradient id="sg${v.id}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${isUp?'#00e5a0':'#ff4d6d'}" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="${isUp?'#00e5a0':'#ff4d6d'}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${path} L300,40 L0,40 Z" fill="url(#sg${v.id})"/>
          <path d="${path}" fill="none" stroke="${isUp?'#00e5a0':'#ff4d6d'}" stroke-width="1.5"/>
        </svg>
      </div>
    </div>`;
  }).join('');
}

function renderActivity() {
  const icons = { deposit:'⬇', withdraw:'⬆', harvest:'✦' };
  document.getElementById('activityList').innerHTML = ACTIVITIES.map(a => `
    <div class="activity-item">
      <div class="activity-type ${a.type}">${icons[a.type]}</div>
      <div class="activity-body">
        <div class="activity-title">${a.title}</div>
        <div class="activity-meta">${a.vault}</div>
      </div>
      <div class="activity-amount">
        <div class="activity-usd ${a.positive?'positive':'negative'}">${a.amount}</div>
        <div class="activity-time">${a.time}</div>
      </div>
    </div>`).join('');
}

function renderEarnings() {
  document.getElementById('earningsList').innerHTML = EARNINGS.map(e => `
    <div class="activity-item">
      <div class="activity-body">
        <div class="activity-title">${e.title}</div>
        <div class="activity-meta">${e.sub}</div>
      </div>
      <div class="activity-amount">
        <div class="activity-usd positive">${e.amount}</div>
        <div class="activity-time">${e.time}</div>
      </div>
    </div>`).join('');
}

function filterChain(btn, chain) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = chain;
  renderVaults(chain);
}

function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(() => {
    btn.classList.remove('spinning');
    renderVaults(currentFilter);
    showToast('✓ 数据已刷新');
  }, 700);
}

function loadWallet() {
  const addr = document.getElementById('addressInput').value.trim();
  if (!addr) { showToast('请输入钱包地址'); return; }
  showToast('正在加载 ' + addr.slice(0,8) + '...' + addr.slice(-4));
}

function showVaultDetail(id) {
  const v = VAULTS.find(x=>x.id===id);
  showToast(`${v.name} · APY ${v.apy}% · 已赚 $${v.earned}`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Init
renderVaults('all');
renderActivity();
renderEarnings();

// Auto refresh every 30s
setInterval(() => { renderVaults(currentFilter); }, 30000);
</script>
</body>
</html>
