<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Aave 金库实时资产监控 (Zapper API)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <style>
    body { background: #10151b; color: #eaf7f4; font-family: 'Segoe UI',Arial,sans-serif; margin: 0; }
    header { padding: 24px 0 12px 0; text-align: center; color: #64efba; font-size: 28px;}
    .container { max-width:860px; margin:32px auto 0 auto; background:#16202b; border-radius:14px; padding:28px 16px; box-shadow: 0 3px 30px #0005;}
    .desc { color:#a7b9cc; text-align:center; margin:0 0 18px 0;}
    .refresh-btn{color:#202; background:#64efba;border:none;border-radius:5px;padding:7px 24px;font-weight:700;cursor:pointer; float:right;}
    .refresh-btn:hover{background:#97ffe7;}
    .updated {font-size:12px;color:#87cfbc;text-align: right;margin-bottom:4px;}
    .vault-list{margin-top:20px;}
    .vault-card{background:#232a36; border-radius:9px; margin-bottom:20px; padding:17px;}
    .vault-title{color:#64efba;font-size:17px;font-weight:bold;margin-bottom:3px;}
    .vault-sub{color:#aaaacf;font-size:13px;margin-bottom:10px;}
    .asset-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid #293140;}
    .asset-row:last-child{border-bottom:0;}
    .asset-logo img{width:17px;height:17px;vertical-align:middle;margin-right:5px;border-radius:2px;}
    .asset-name{flex:0 0 120px;}
    .asset-amt{flex:0 0 120px;color:#64efba;}
    .asset-value{flex:1 1 auto;}
    .err{color:#ff5353;text-align:center;}
    .loading{text-align:center;color:#63efba;margin:36px 0;}
    @media(max-width:600px){.container{padding:8px 3px;}.refresh-btn{width:94%;float:none;display:block;margin:8px auto 0 auto;}}
  </style>
</head>
<body>
  <header>
    Aave 协议金库资产监控
  </header>
  <div class="container">
    <div class="desc">
      自动追踪 <b>Aave</b> 协议全部池子底层资产变动 (Powered by Zapper)
      <button class="refresh-btn" onclick="loadAaveAssets()">刷新</button>
    </div>
    <div id="updated" class="updated"></div>
    <div id="vaults" class="vault-list"></div>
    <div id="err" class="err"></div>
  </div>
  <script>
    // 你的Zapper API KEY
    const ZAPPER_API_KEY = "e2f4ed92-88d8-461b-9642-ca9c884aac8d";

    async function loadAaveAssets() {
      document.getElementById('vaults').innerHTML = '<div class="loading">正在加载 Aave 金库资产...</div>';
      document.getElementById('err').textContent = '';
      document.getElementById('updated').innerText = '';
      try {
        const url = `https://api.zapper.fi/v2/apps/aave/balances?api_key=${ZAPPER_API_KEY}`;
        const res = await fetch(url);
        if(res.status===429) throw new Error("API 限流（429），请稍后重试");
        if(res.status===404) throw new Error("Aave 资产接口无数据 (404)");
        if(!res.ok) throw new Error("HTTP "+res.status);
        const data = await res.json();
        document.getElementById('updated').innerText = "数据刷新于 " + (new Date()).toLocaleTimeString();
        document.getElementById('vaults').innerHTML = data.map(renderVault).join('');
      } catch(e) {
        document.getElementById('vaults').innerHTML = '';
        document.getElementById('err').textContent = "拉取失败：" + e.message;
      }
    }

    function renderVault(v) {
      let sub = v.network ? `[${v.network}]` : '';
      let assetRows = (v.tokens||[]).map(token => `
        <div class="asset-row">
          <span class="asset-logo">${token.icon?`<img src="${token.icon}"/>`:""}</span>
          <span class="asset-name">${token.symbol||token.label||token.name||"?"}</span>
          <span class="asset-amt">${token.balanceDisplay||Number(token.balanceRaw||0).toFixed(3)}</span>
          <span class="asset-value">$${token.balanceUSD?token.balanceUSD.toLocaleString(undefined,{maximumFractionDigits:2}):"-"}</span>
        </div>
      `).join('');
      return `
      <div class="vault-card">
        <div class="vault-title">${v.label||v.appName||"Aave池"} <small>${v.address||""}</small></div>
        <div class="vault-sub">${sub} ${v.vaultType||""}</div>
        <div>${assetRows || "<i style='color:#888'>暂无资产明细</i>"}</div>
      </div>`;
    }

    // 自动加载
    window.onload = loadAaveAssets;
  </script>
</body>
</html>
